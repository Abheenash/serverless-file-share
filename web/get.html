<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Download a file · Serverless File Share</title>
  <meta name="description" content="Download a self-destructing file shared via Serverless File Share on AWS." />
  <style>
    :root {
      --nav:#161d26; --bg:#f2f3f3; --card:#fff; --border:#c6c6cd; --border-soft:#e9ebed;
      --text:#0f141a; --muted:#5f6b7a; --link:#006ce0; --link-hover:#002b66; --ok:#037f0c; --orange-2:#ec7211;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; }
    body { font:14px/1.5 "Amazon Ember","Helvetica Neue",Roboto,Arial,sans-serif; background:var(--bg); color:var(--text);
      display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .card { background:var(--card); border:1px solid var(--border-soft); border-radius:16px; width:100%; max-width:440px; overflow:hidden;
      box-shadow:0 10px 40px rgba(0,0,0,.08); }
    .card-head { background:var(--nav); color:#fff; padding:1rem 1.2rem; display:flex; align-items:center; gap:.6rem; font-weight:700; }
    .card-head .dot { width:9px; height:9px; border-radius:50%; background:var(--ok); box-shadow:0 0 0 3px rgba(3,127,12,.22); }
    .card-body { padding:1.4rem 1.3rem; }
    .fname { font-size:1.15rem; font-weight:700; word-break:break-word; margin-bottom:.2rem; }
    .kv { margin:.9rem 0; }
    .kv div { display:flex; justify-content:space-between; gap:1rem; padding:.45rem 0; border-bottom:1px solid var(--border-soft); font-size:.85rem; }
    .kv div:last-child { border-bottom:0; } .kv span { color:var(--muted); } .kv b { color:var(--text); text-align:right; }
    label { display:block; font-size:.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:1rem 0 .35rem; }
    input[type=password] { width:100%; padding:.65rem .7rem; border:1px solid var(--border); border-radius:8px; font-size:.95rem; }
    input[type=password]:focus { outline:2px solid var(--link); border-color:var(--link); }
    button { margin-top:1.2rem; width:100%; padding:.7rem 1rem; border:0; border-radius:8px; cursor:pointer;
      background:var(--orange-2); color:#fff; font-size:.95rem; font-weight:700; }
    button:hover { background:#d9600d; } button:disabled { opacity:.5; cursor:not-allowed; }
    .status { margin-top:1rem; font-size:.88rem; color:var(--muted); min-height:1.2em; text-align:center; }
    .status.err { color:#d13212; } .status.ok { color:var(--ok); }
    .gone { text-align:center; padding:1rem 0; } .gone .big { font-size:2.2rem; } .gone .msg { color:var(--muted); margin-top:.5rem; }
    .lock { color:var(--muted); font-size:.82rem; margin-top:.2rem; }
    footer { position:fixed; bottom:.8rem; left:0; right:0; text-align:center; color:var(--muted); font-size:.76rem; }
    footer a { color:var(--link); }
    .skel { height:14px; border-radius:6px; margin:.5rem 0; background:linear-gradient(90deg,#eee 25%,#e2e4e7 37%,#eee 63%); background-size:400% 100%; animation:sh 1.3s infinite; }
    @keyframes sh { 0%{background-position:100% 0;} 100%{background-position:-100% 0;} }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-head"><span class="dot"></span> Serverless File Share</div>
    <div class="card-body" id="body">
      <div class="skel" style="width:60%"></div>
      <div class="skel" style="width:90%"></div>
      <div class="skel" style="width:40%"></div>
    </div>
  </div>
  <footer>🔐 End-to-end encrypted · decrypted in your browser · self-destructing · <a href="https://abheenash.com/#project/serverless-file-share">how it's built ↗</a></footer>
  <script src="config.js"></script>
  <script src="sfs-crypto.js"></script>
  <script src="get.js"></script>
</body>
</html>
