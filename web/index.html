<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Serverless File Share — AWS Console</title>
  <style>
    :root { --squid:#232f3e; --squid-2:#2e3b4e; --orange:#ff9900; --orange-btn:#ec7211;
      --bg:#f2f3f3; --card:#fff; --border:#d5dbdb; --text:#16191f; --muted:#5f6b7a; --link:#0073bb; --ok:#1d8102; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font:14px/1.55 "Amazon Ember",system-ui,-apple-system,"Segoe UI",Arial,sans-serif; background:var(--bg); color:var(--text); }
    a { color:var(--link); text-decoration:none; } a:hover { text-decoration:underline; }
    /* top console bar */
    .topbar { display:flex; align-items:center; gap:.6rem; background:var(--squid); color:#fff; height:48px; padding:0 1rem; }
    .cube { width:18px; height:18px; background:var(--orange); border-radius:3px; box-shadow:inset -3px -3px 0 rgba(0,0,0,.2); }
    .tb-brand { font-weight:700; } .tb-service { color:var(--orange); font-weight:600; font-size:.9rem; }
    .back-btn { color:#fff; border:1px solid #56606e; border-radius:6px; padding:.3rem .8rem; font-size:.85rem; text-decoration:none; }
    .back-btn:hover { border-color:var(--orange); background:rgba(255,255,255,.08); }
    .tb-service { margin-left:auto; }
    .crumb { background:#fafafa; border-bottom:1px solid var(--border); padding:.5rem 1.2rem; font-size:.82rem; color:var(--muted); }
    .crumb b { color:var(--text); }
    /* content */
    .wrap { max-width:640px; margin:2rem auto; padding:0 1rem; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .card-head { background:linear-gradient(180deg,var(--squid),var(--squid-2)); color:#fff; padding:1.3rem 1.5rem; border-left:4px solid var(--orange); }
    .card-head h1 { font-size:1.3rem; } .card-head p { color:#c9d1d9; font-size:.88rem; margin-top:.25rem; }
    .card-body { padding:1.5rem; }
    label { display:block; font-size:.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:1rem 0 .35rem; }
    label:first-child { margin-top:0; }
    input[type=file], select { width:100%; padding:.6rem; background:#fff; color:var(--text); border:1px solid var(--border); border-radius:6px; font-size:.9rem; }
    button#go { width:100%; margin-top:1.5rem; padding:.75rem; border:0; border-radius:6px; cursor:pointer; background:var(--orange-btn); color:#fff; font-size:.95rem; font-weight:600; }
    button#go:disabled { opacity:.5; cursor:not-allowed; }
    .status { margin-top:1rem; font-size:.88rem; color:var(--muted); min-height:1.2em; } .status.err { color:#d13212; }
    #result { margin-top:1.5rem; display:none; }
    .link-row { display:flex; gap:.5rem; }
    .link-row input { flex:1; padding:.55rem; background:#f8fdf8; color:var(--ok); border:1px solid var(--border); border-radius:6px; font-size:.82rem; }
    .link-row button { border:1px solid var(--border); background:#fff; border-radius:6px; padding:.55rem .9rem; cursor:pointer; font-weight:600; }
    .meta { color:var(--muted); font-size:.8rem; margin-top:.6rem; }
    footer { text-align:center; color:var(--muted); font-size:.78rem; padding:1.5rem; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="back-btn" href="https://abheenash.com">← Back to Portfolio</a>
    <span class="cube"></span>
    <span class="tb-brand">Abheenash</span>
    <span class="tb-service">Serverless File Share</span>
  </header>
  <div class="crumb">Console Home <span>›</span> <b>Serverless File Share</b></div>

  <div class="wrap">
    <div class="card">
      <div class="card-head">
        <h1>🔥 Serverless File Share</h1>
        <p>Upload a file, get a link that self-destructs. Encrypted at rest; nothing lingers.</p>
      </div>
      <div class="card-body">
        <label for="file">File</label>
        <input type="file" id="file" />

        <label for="expiry">Link lifetime</label>
        <select id="expiry">
          <option value="900">15 minutes</option>
          <option value="3600" selected>1 hour</option>
          <option value="86400">1 day</option>
          <option value="604800">7 days</option>
        </select>

        <button id="go">Create share link</button>
        <div class="status" id="status"></div>

        <div id="result">
          <label>Share link</label>
          <div class="link-row">
            <input id="shareLink" readonly />
            <button id="copy">Copy</button>
          </div>
          <div class="meta" id="expiryNote"></div>
        </div>
      </div>
    </div>
    <footer>Built on AWS · Lambda · API Gateway · S3 · DynamoDB · KMS</footer>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
